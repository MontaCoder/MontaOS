<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: rgb(0, 0, 0);
      margin: 0;
    }

    #webgl {
      pointer-events: none;
    }

    #ui-app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #ui {
      position: absolute;
      overflow: hidden;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #monitor-videos {
      pointer-events: none;
      position: 'absolute';
      opacity: 0;
      width: 0;
      height: 0;
      top: 0;
      left: 0;

    }

    #css {
      cursor: pointer;
    }

    #ui-interactive {
      position: absolute;
      top: 0;
      left: 0;
      width: 256px;
    }

    video {
      position: absolute;
      top: 0;
      pointer-events: none;
    }
  </style>

  <!-- Primary Meta Tags -->
  <title>MontaOS | Immersive 3D Portfolio</title>
  <meta name="title" content="MontaOS | Immersive 3D Portfolio">
  <meta name="description"
    content="MontaOS is an immersive 3D portfolio built with React, Three.js, CSS3DRenderer, and baked GLTF assets. The experience includes a BIOS-style boot sequence, spatial audio, and cinematic camera transitions.">
  <meta name="application-name" content="MontaOS">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MontaOS">
  <meta property="og:title" content="MontaOS | Immersive 3D Portfolio">
  <meta property="og:description"
    content="MontaOS is an immersive 3D portfolio built with React, Three.js, CSS3DRenderer, and baked GLTF assets. The experience includes a BIOS-style boot sequence, spatial audio, and cinematic camera transitions.">
   <meta property="og:image" content="images/preview.jpg">
  <meta property="og:image:alt" content="MontaOS preview image">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MontaOS | Immersive 3D Portfolio">
  <meta name="twitter:description"
    content="MontaOS is an immersive 3D portfolio built with React, Three.js, CSS3DRenderer, and baked GLTF assets. The experience includes a BIOS-style boot sequence, spatial audio, and cinematic camera transitions.">
   <meta name="twitter:image" content="images/preview.jpg">

  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FJBF6WF60"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-4FJBF6WF60');
  </script>
</head>

<body>
  <div id="css"></div>
  <div id="webgl"></div>
  <div id="overlay"></div>
  <div id="ui-interactive"></div>
  <div id="ui"></div>
  <div id="monitor-videos">
    <video id="video-1" muted loop autoplay preload="metadata" width="0" height="0" src="textures/monitor/video/base-static.mp4"
      style="opacity: 0;"></video>
    <video id="video-2" muted loop autoplay width="0" height="0"
      preload="metadata" src="textures/monitor/video/static-texture-layer.mp4" style="opacity: 0;"></video>
  </div>
</body>

</html>
